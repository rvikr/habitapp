server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://us-assets.i.posthog.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://api.dicebear.com; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://o4511332581244928.ingest.de.sentry.io https://us.i.posthog.com https://us-assets.i.posthog.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed static assets
    location /_expo/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve the PWA manifest with the correct MIME type; nginx otherwise serves
    # .webmanifest as application/octet-stream, which browsers warn about.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
