server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://us-assets.i.posthog.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://api.dicebear.com https://images.unsplash.com; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://o4511332581244928.ingest.de.sentry.io https://us.i.posthog.com https://us-assets.i.posthog.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # No "$uri/" in try_files: a directory match makes nginx 301-redirect to
    # add a trailing slash, and any redirect on a navigation response breaks
    # the installed iOS PWA ("response served by service worker has
    # redirections"). The SPA fallback covers every route directly.
    location / {
        try_files $uri /index.html;
    }

    # The shell references content-hashed bundles that change every deploy —
    # it must never be served stale. `expires -1` sends Cache-Control: no-cache
    # without suppressing the inherited security headers (add_header would).
    location = /index.html {
        expires -1;
    }

    # Browsers cap SW script caching at 24h; make updates propagate immediately
    # so a fixed sw.js reaches installed PWAs on next launch.
    location = /sw.js {
        expires -1;
    }

    # Long cache for hashed static assets
    location /_expo/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve the PWA manifest with the correct MIME type; nginx otherwise serves
    # .webmanifest as application/octet-stream, which browsers warn about.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
